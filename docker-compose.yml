version: "3.9"

services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ai_career_navigator
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    environment:
      APP_NAME: AI Career Navigator API
      API_PREFIX: /api
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/ai_career_navigator
      SECRET_KEY: replace-me-in-production
      ALLOWED_ORIGINS: '["http://localhost:5173","http://localhost"]'
    ports:
      - "8000:8000"
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: http://localhost:8000/api
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  postgres_data:
