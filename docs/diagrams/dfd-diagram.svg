<svg width="1600" height="980" viewBox="0 0 1600 980" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="980" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F7F9FC"/>
      <stop offset="1" stop-color="#EEF3F8"/>
    </linearGradient>
    <linearGradient id="header" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#21324A"/>
      <stop offset="1" stop-color="#38527A"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#17263C" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10V0Z" fill="#54739D"/>
    </marker>
    <style>
      .title{font:700 42px 'Segoe UI',Arial,sans-serif;fill:#20314A}
      .subtitle{font:500 18px 'Segoe UI',Arial,sans-serif;fill:#5B708D}
      .nodeTitle{font:700 24px 'Segoe UI',Arial,sans-serif;fill:#20314A}
      .nodeText{font:500 18px 'Segoe UI',Arial,sans-serif;fill:#4D6483}
      .boxLabel{font:700 16px 'Segoe UI',Arial,sans-serif;fill:#FFFFFF;letter-spacing:2px}
      .flow{font:600 16px 'Segoe UI',Arial,sans-serif;fill:#506985}
    </style>
  </defs>

  <rect width="1600" height="980" fill="url(#bg)"/>

  <text x="800" y="76" text-anchor="middle" class="title">Data Flow Diagram - AI Career Navigator</text>
  <text x="800" y="110" text-anchor="middle" class="subtitle">Level 1 overview of user, admin, core modules, and stored data</text>

  <rect x="95" y="220" width="220" height="110" rx="28" fill="#FFF7EF" stroke="#F2CC8F" stroke-width="2" filter="url(#shadow)"/>
  <text x="205" y="273" text-anchor="middle" class="nodeTitle">User</text>
  <text x="205" y="304" text-anchor="middle" class="nodeText">Assessment input</text>

  <rect x="1285" y="220" width="220" height="110" rx="28" fill="#EEF8F6" stroke="#8CD5BF" stroke-width="2" filter="url(#shadow)"/>
  <text x="1395" y="273" text-anchor="middle" class="nodeTitle">Admin</text>
  <text x="1395" y="304" text-anchor="middle" class="nodeText">Content management</text>

  <rect x="520" y="170" width="560" height="170" rx="36" fill="white" stroke="#D8E1EC" stroke-width="2" filter="url(#shadow)"/>
  <rect x="520" y="170" width="560" height="58" rx="36" fill="url(#header)"/>
  <text x="800" y="207" text-anchor="middle" class="boxLabel">AI CAREER NAVIGATOR SYSTEM</text>
  <text x="570" y="265" class="nodeTitle">Core Processes</text>
  <text x="570" y="302" class="nodeText">1. Authentication</text>
  <text x="840" y="302" class="nodeText">2. Assessment</text>
  <text x="570" y="334" class="nodeText">3. Recommendation Engine</text>
  <text x="840" y="334" class="nodeText">4. Roadmap &amp; Progress</text>

  <rect x="190" y="505" width="270" height="120" rx="28" fill="white" stroke="#D8E1EC" stroke-width="2" filter="url(#shadow)"/>
  <text x="325" y="552" text-anchor="middle" class="nodeTitle">Users</text>
  <text x="325" y="586" text-anchor="middle" class="nodeText">accounts, roles, profiles</text>

  <rect x="505" y="505" width="270" height="120" rx="28" fill="white" stroke="#D8E1EC" stroke-width="2" filter="url(#shadow)"/>
  <text x="640" y="552" text-anchor="middle" class="nodeTitle">Assessments</text>
  <text x="640" y="586" text-anchor="middle" class="nodeText">inputs, preferences, history</text>

  <rect x="820" y="505" width="270" height="120" rx="28" fill="white" stroke="#D8E1EC" stroke-width="2" filter="url(#shadow)"/>
  <text x="955" y="552" text-anchor="middle" class="nodeTitle">Careers &amp; Skills</text>
  <text x="955" y="586" text-anchor="middle" class="nodeText">career catalog, skill map</text>

  <rect x="1135" y="505" width="270" height="120" rx="28" fill="white" stroke="#D8E1EC" stroke-width="2" filter="url(#shadow)"/>
  <text x="1270" y="552" text-anchor="middle" class="nodeTitle">Resources &amp; Progress</text>
  <text x="1270" y="586" text-anchor="middle" class="nodeText">roadmap items, completion state</text>

  <line x1="315" y1="275" x2="520" y2="255" stroke="#54739D" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="420" y="246" text-anchor="middle" class="flow">register, login, assessment</text>

  <line x1="1080" y1="255" x2="1285" y2="275" stroke="#54739D" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="1185" y="246" text-anchor="middle" class="flow">analytics, CRUD actions</text>

  <line x1="520" y1="315" x2="315" y2="315" stroke="#54739D" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="418" y="350" text-anchor="middle" class="flow">results, history, roadmap</text>

  <line x1="1285" y1="315" x2="1080" y2="315" stroke="#54739D" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="1182" y="350" text-anchor="middle" class="flow">resource updates, reports</text>

  <line x1="650" y1="340" x2="390" y2="505" stroke="#54739D" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="480" y="445" class="flow">auth data</text>

  <line x1="740" y1="340" x2="665" y2="505" stroke="#54739D" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="690" y="430" class="flow">assessment data</text>

  <line x1="860" y1="340" x2="910" y2="505" stroke="#54739D" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="905" y="430" class="flow">matching rules</text>

  <line x1="970" y1="340" x2="1215" y2="505" stroke="#54739D" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="1120" y="445" class="flow">resources, progress</text>

  <line x1="325" y1="505" x2="640" y2="625" stroke="#B1C2D8" stroke-width="2" stroke-dasharray="10 8"/>
  <text x="445" y="610" class="flow">user linked to assessments</text>

  <line x1="955" y1="625" x2="1270" y2="625" stroke="#B1C2D8" stroke-width="2" stroke-dasharray="10 8"/>
  <text x="1110" y="615" class="flow">careers mapped to resources</text>

  <line x1="640" y1="625" x2="955" y2="625" stroke="#B1C2D8" stroke-width="2" stroke-dasharray="10 8"/>
  <text x="798" y="660" text-anchor="middle" class="flow">recommendations generated from assessments + skills</text>

  <rect x="430" y="760" width="740" height="120" rx="28" fill="#FFFFFF" stroke="#D8E1EC" stroke-width="2" filter="url(#shadow)"/>
  <text x="800" y="812" text-anchor="middle" class="nodeTitle">System Outputs</text>
  <text x="800" y="846" text-anchor="middle" class="nodeText">ranked careers, explainable fit score, roadmap resources, saved progress, admin insights</text>
</svg>
